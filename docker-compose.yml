services:
  backend:
    build: ./backend
    container_name: echolearn-backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://echolearn:echolearn@db:5432/echolearn
    volumes:
      - ./data:/app/data

  db:
    image: postgres:15
    container_name: echolearn-db
    environment:
      POSTGRES_USER: echolearn
      POSTGRES_PASSWORD: echolearn
      POSTGRES_DB: echolearn
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  frontend:
    image: node:20
    container_name: echolearn-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm install axios && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db-data:
